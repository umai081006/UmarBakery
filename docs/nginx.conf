# ============================================================
# Umar Bakery — Production Nginx Configuration
# ============================================================
# SETUP:
#   1. Copy to: /etc/nginx/sites-available/umarbakery
#   2. Enable: sudo ln -s /etc/nginx/sites-available/umarbakery /etc/nginx/sites-enabled/
#   3. Install SSL: sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#   4. Test config: sudo nginx -t
#   5. Reload: sudo systemctl reload nginx
# ============================================================
# Replace ALL occurrences of:
#   yourdomain.com  -> your actual domain name
#   /var/www/umarbakery -> your actual project path
# ============================================================

# HTTP → HTTPS redirect (all traffic)
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Main Production Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # -------------------------------------------------------
    # Document Root — MUST point to /public, NOT project root
    # -------------------------------------------------------
    root /var/www/umarbakery/public;
    index index.php;

    # -------------------------------------------------------
    # SSL — Managed by Certbot (auto-renewed)
    # -------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # -------------------------------------------------------
    # Security Headers (application-level headers set by
    # SecurityHeaders middleware. Nginx adds transport-level.)
    # -------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # -------------------------------------------------------
    # File Size (for product image + payment proof uploads)
    # -------------------------------------------------------
    client_max_body_size 10M;

    # -------------------------------------------------------
    # Logging
    # -------------------------------------------------------
    access_log /var/log/nginx/umarbakery.access.log;
    error_log  /var/log/nginx/umarbakery.error.log warn;

    # -------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json image/svg+xml font/woff2;
    gzip_min_length 256;

    # -------------------------------------------------------
    # Laravel Application Router
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # -------------------------------------------------------
    # PHP-FPM
    # -------------------------------------------------------
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Timeouts (for Midtrans payment creation — can take ~5s)
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    60s;
        fastcgi_read_timeout    60s;
    }

    # -------------------------------------------------------
    # Static Assets — Long cache with Vite content hash
    # -------------------------------------------------------
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------
    # Block access to hidden files (.env, .git, etc.)
    # -------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # -------------------------------------------------------
    # Block access to sensitive PHP files in root
    # -------------------------------------------------------
    location ~* ^/(composer\.(json|lock)|package(-lock)?\.json|phpunit\.xml|\.env.*|artisan)$ {
        deny all;
    }

    # -------------------------------------------------------
    # Block direct PHP execution in storage/uploads
    # (defense-in-depth — Cloudinary handles files, but local
    #  fallback writes to public/uploads/)
    # -------------------------------------------------------
    location ~ ^/uploads/.*\.php$ {
        deny all;
    }
}
